# cargo-deny configuration
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
ignore = [
    # Transitive unmaintained-crate warnings — not vulnerabilities. Cleared
    # when upstream consumers (wgpu/naga, proc-macro libs) migrate off them.
    "RUSTSEC-2024-0388", # derivative unmaintained (via wgpu/naga)
    "RUSTSEC-2024-0370", # proc-macro-error unmaintained
    "RUSTSEC-2024-0436", # paste unmaintained
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "CECILL-B",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8
# egraph-rs sub-crates don't carry per-crate license fields in their
# Cargo.toml. The workspace root carries an MIT LICENSE
# (https://github.com/likr/egraph-rs/blob/main/LICENSE) that applies
# to every member crate; explicitly assert MIT here so cargo-deny's
# strict "no license field" check doesn't gate the build.
[[licenses.clarify]]
crate = "petgraph-algorithm-shortest-path"
expression = "MIT"
license-files = []

[[licenses.clarify]]
crate = "petgraph-drawing"
expression = "MIT"
license-files = []

[[licenses.clarify]]
crate = "petgraph-layout-kamada-kawai"
expression = "MIT"
license-files = []

[[licenses.clarify]]
crate = "petgraph-layout-stress-majorization"
expression = "MIT"
license-files = []

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
# `wildcards = "deny"` is too strict for git deps — they declare no version and
# `cargo-deny` treats that as a wildcard. `allow-wildcard-paths` covers the
# specific case of git/path deps without inviting `version = "*"` in registry deps.
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# egraph-rs is a Rust graph-layout workspace whose sub-crates aren't
# published to crates.io. Pinned via rev in panschema-viz/Cargo.toml.
# Currently using the padamson/egraph-rs fork, which ports the
# workspace from petgraph 0.6 → 0.8; repin to likr/egraph-rs once
# our upstream PR lands.
allow-git = [
    "https://github.com/likr/egraph-rs",
    "https://github.com/padamson/egraph-rs",
]
