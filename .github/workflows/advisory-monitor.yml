name: Security Advisory Monitor

# Daily check for newly published RustSec advisories against the
# dependency tree, decoupled from push cadence. `cargo deny check
# advisories` reads deny.toml's `[advisories].ignore`, so already-triaged
# advisories stay quiet and only a *new* one trips the check. On a hit, a
# single tracking issue is opened (or updated); when the tree is clean
# again the issue is closed.
#
# Why a monitor when Security & Quality already runs `cargo deny` on push
# and weekly: advisories are published by the world, not by a commit. This
# surfaces a new one proactively — as an issue you can triage (bump the
# dep, or accept + ignore in deny.toml with rationale) — before it trips a
# push and reds `main`.

on:
  schedule:
    # Daily at 07:00 UTC.
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  advisories:
    name: Check for new advisories
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ISSUE_TITLE: "Security: new dependency advisory detected"
      ISSUE_LABEL: security-advisory
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Check advisories
        id: check
        shell: bash
        run: |
          set +e
          report="$(cargo deny check advisories 2>&1)"
          code=$?
          set -e
          echo "$report"
          if [ "$code" -ne 0 ]; then
            {
              echo "report<<REPORT_EOF"
              echo "$report"
              echo "REPORT_EOF"
            } >> "$GITHUB_OUTPUT"
            echo "has_new=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update tracking issue
        if: steps.check.outputs.has_new == 'true'
        # Pass the report through the environment, not `${{ }}` string
        # interpolation into the script — advisory text is community-authored
        # and could otherwise be evaluated by the shell (injection).
        env:
          REPORT: ${{ steps.check.outputs.report }}
        shell: bash
        run: |
          set -euo pipefail

          body="$(cat <<EOF
          \`cargo deny check advisories\` failed — a dependency advisory that is
          **not** in \`deny.toml\`'s \`[advisories].ignore\` is affecting the tree.

          Triage each one:
          - **Fix available** → bump the crate (\`cargo update -p <crate>\`), or bump
            the parent that pins it.
          - **No fix / upstream-blocked** → accept the risk and add the \`RUSTSEC-…\`
            id to \`deny.toml\`'s ignore list *with a rationale*, then mirror it into
            the \`cargo audit\` invocations in \`security.yml\` and \`.pre-commit-config.yaml\`.

          \`\`\`
          ${REPORT}
          \`\`\`

          _Maintained automatically by the Security Advisory Monitor workflow._
          EOF
          )"

          existing="$(gh issue list \
            --state open \
            --label "$ISSUE_LABEL" \
            --search "in:title \"$ISSUE_TITLE\"" \
            --json number,title \
            --jq ".[] | select(.title == \"$ISSUE_TITLE\") | .number" \
            | head -1)"

          if [ -n "$existing" ]; then
            echo "Updating existing tracking issue #$existing"
            gh issue edit "$existing" --body "$body"
          else
            echo "Opening new tracking issue"
            gh label create "$ISSUE_LABEL" \
              --description "Tracks newly published dependency advisories awaiting triage" \
              --color B60205 2>/dev/null || true
            gh issue create \
              --title "$ISSUE_TITLE" \
              --label "$ISSUE_LABEL" \
              --body "$body"
          fi

      - name: Close stale tracking issue
        if: steps.check.outputs.has_new == 'false'
        shell: bash
        run: |
          set -euo pipefail
          existing="$(gh issue list \
            --state open \
            --label "$ISSUE_LABEL" \
            --search "in:title \"$ISSUE_TITLE\"" \
            --json number,title \
            --jq ".[] | select(.title == \"$ISSUE_TITLE\") | .number" \
            | head -1)"
          if [ -n "$existing" ]; then
            echo "Advisories clean; closing tracking issue #$existing"
            gh issue close "$existing" \
              --comment "\`cargo deny check advisories\` is clean again. Closing automatically."
          else
            echo "Advisories clean; no tracking issue to close."
          fi
