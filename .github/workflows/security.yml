name: Security & Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Saturday 5am ET
    - cron: '0 9 * * 6'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        # Keep this ignore list in sync with deny.toml's `[advisories].ignore`
        # and the cargo-audit pre-commit hook (see deny.toml for per-ID
        # rationale). Three unmaintained-crate warnings plus the
        # upstream-blocked quick-xml DoS advisories.
        run: >-
          cargo audit
          --ignore RUSTSEC-2024-0388
          --ignore RUSTSEC-2024-0370
          --ignore RUSTSEC-2026-0194
          --ignore RUSTSEC-2026-0195
          --ignore RUSTSEC-2026-0215

  deny:
    name: License & Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Run cargo deny
        run: cargo deny check

  supply-chain:
    name: Supply Chain Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-vet
        run: cargo install cargo-vet

      - name: Run cargo vet
        run: |
          if [ -f supply-chain/audits.toml ]; then
            cargo vet
          else
            echo "supply-chain/ not initialized; skipping. Run 'cargo vet init' to enable."
          fi

  semver-checks:
    name: Semver Compatibility
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks

      - name: Check semver compatibility
        run: cargo semver-checks check-release

  mutation-testing:
    name: Mutation Testing (full)
    runs-on: ubuntu-latest
    # Full-codebase mutation testing — only runs on manual
    # `workflow_dispatch`. Per-push verification is handled by
    # `mutation-testing-diff` below, which scopes to just the lines a
    # push or PR touched. The full run grows linearly with codebase
    # size (panschema is already 4800+ mutants, 13+ hours) and
    # eventually exceeds CI's per-job timeout, so we keep it as a
    # manual escape hatch rather than a scheduled cron.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-mutants-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-mutants-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      # Prebuilt binary via taiki-e/install-action. `cargo install
      # cargo-mutants` fails after a cache hit (cargo refuses to
      # overwrite the existing `~/.cargo/bin/cargo-mutants` without
      # --force); the action handles the already-installed case and is
      # much faster than building from source.
      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      # `.cargo/mutants.toml` passes `--lib` to both the build and run
      # phases, so mutation testing never compiles or runs the
      # integration/e2e test binaries — no wasm bundle, Node, or
      # Playwright needed here. html_writer.rs embeds the pkg artifacts
      # via include_str!/include_bytes!, and empty placeholders satisfy
      # those for a lib-only build (the wasm bytes are never executed).
      - name: Stub wasm bundle for lib-only build
        run: |
          mkdir -p panschema-viz/pkg
          touch panschema-viz/pkg/panschema_viz.js panschema-viz/pkg/panschema_viz_bg.wasm

      - name: Run mutation testing (unit tests only, panschema crate)
        run: cargo mutants

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: mutants.out/

  mutation-testing-diff:
    name: Mutation Testing (diff)
    runs-on: ubuntu-latest
    # Fast per-push variant of the mutation-testing job: scope to the
    # lines touched in this push or pull request via `cargo mutants
    # --in-diff`. Typical runtime is seconds-to-minutes rather than the
    # full-codebase job's tens of minutes.
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          # Need history beyond HEAD so `git diff` can reach the base
          # commit (push: `before` SHA; PR: merge base of base ref).
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-mutants-diff-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-mutants-diff-
            ${{ runner.os }}-cargo-mutants-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      # Prebuilt binary via taiki-e/install-action. `cargo install
      # cargo-mutants` fails after a cache hit (cargo refuses to
      # overwrite the existing `~/.cargo/bin/cargo-mutants` without
      # --force); the action handles the already-installed case and is
      # much faster than building from source.
      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      # `.cargo/mutants.toml` passes `--lib` to both the build and run
      # phases, so the baseline and every mutant compile and run only
      # the lib test target — no e2e binary, so no wasm bundle, Node,
      # or Playwright setup here. mutants.sh stubs the pkg/ files
      # html_writer.rs embeds via include_str!/include_bytes!, which
      # satisfies a lib-only build (the wasm bytes are never executed).

      # Compute the right diff base for this trigger.
      # - pull_request: merge base against the PR target branch
      # - push: the `before` SHA of the push (the parent of `after`).
      #   First push to a branch has `before = 000...0`; fall back to
      #   HEAD~1 in that case.
      - name: Compute diff base
        id: base
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "ref=HEAD~1" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.event.before }}" >> $GITHUB_OUTPUT
          fi

      - name: Run mutation testing on diff
        run: ./scripts/mutants.sh ${{ steps.base.outputs.ref }}

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report-diff
          path: mutants.out/
