name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allow this workflow to be called by other workflows (e.g., release.yml)
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"

      # panschema/src/html_writer.rs include_bytes! the wasm pkg artifacts at
      # compile time. For type-checking only, empty placeholders are fine.
      - name: Stub WASM artifacts
        run: |
          mkdir -p panschema-viz/pkg
          touch panschema-viz/pkg/panschema_viz.js panschema-viz/pkg/panschema_viz_bg.wasm

      - name: Check compilation on MSRV
        run: cargo check -p panschema

  lint:
    name: Lint and Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      # Empty placeholders are fine for type-check / clippy / cargo doc /
      # doctests — they don't exercise the wasm bytes at runtime.
      - name: Stub WASM artifacts
        run: |
          mkdir -p panschema-viz/pkg
          touch panschema-viz/pkg/panschema_viz.js panschema-viz/pkg/panschema_viz_bg.wasm

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (release)
        run: cargo clippy -p panschema --all-targets -- -D warnings

      - name: Clippy (with dev feature)
        run: cargo clippy -p panschema --all-targets --features dev -- -D warnings

      - name: Run doc-tests
        run: cargo test --doc -p panschema

      - name: Generate documentation
        run: cargo doc --no-deps -p panschema

  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
        targets: wasm32-unknown-unknown

    - name: Install wasm-pack
      uses: taiki-e/install-action@wasm-pack

    - name: Cache Cargo
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
          drivers/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Cache WASM build
      uses: actions/cache@v5
      id: wasm-cache
      with:
        path: panschema-viz/pkg/
        key: wasm-${{ runner.os }}-${{ hashFiles('panschema-viz/src/**', 'panschema-viz/Cargo.toml') }}

    - name: Build WASM package
      if: steps.wasm-cache.outputs.cache-hit != 'true'
      run: wasm-pack build panschema-viz --target web --features webgpu

    - name: Install cargo-nextest
      uses: taiki-e/install-action@nextest

    - name: Setup Node.js (for Playwright)
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Get Playwright version
      id: playwright-version
      shell: bash
      run: echo "version=1.59.1" >> $GITHUB_OUTPUT

    - name: Cache Playwright browsers and driver
      uses: actions/cache@v5
      id: playwright-cache
      with:
        path: |
          ~/.cache/ms-playwright
          ~/.cache/playwright-rust
          ~/Library/Caches/ms-playwright
          ~/Library/Caches/playwright-rust
          ~/AppData/Local/ms-playwright
          ~/AppData/Local/playwright-rust
        key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright@1.59.1 install --with-deps

    - name: Install Playwright dependencies (cached)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Linux" ]; then
          npx playwright@1.59.1 install-deps
        fi

    - name: Run tests (release)
      run: cargo nextest run -p panschema
      env:
        BROWSER: all

    - name: Run tests (with dev feature)
      run: cargo nextest run -p panschema --features dev
      env:
        BROWSER: all
