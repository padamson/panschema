name: Dependabot auto-merge

# Dependabot opens PRs but never merges them. This enables auto-merge on
# every Dependabot PR so it merges once the required status checks pass —
# the same checks main's ruleset enforces (Test, Security & Quality, …).
# Applies to all update types (major, minor, patch); the status checks are
# the gate, so a bump that breaks the build simply won't merge.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable auto-merge
    runs-on: ubuntu-latest
    # Only Dependabot's own PRs — never anyone else's.
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Enable auto-merge (squash)
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
