[package]
name = "panschema-viz"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
description = "WebGPU visualization for panschema schema graphs"
license = "Apache-2.0"
repository = "https://github.com/padamson/panschema"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []
# Enable WebGPU acceleration (requires wgpu)
webgpu = ["dep:wgpu", "dep:bytemuck"]

[dependencies]
# WASM-specific
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "Window", "Document", "Navigator",
    "HtmlCanvasElement", "CanvasRenderingContext2d",
    "TextMetrics",
    "console",
] }
console_error_panic_hook = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Graph layout (egraph-rs workspace, git-only — sub-crates not on
# crates.io). Pinned to the 2025-10-29 HEAD; bump deliberately, since
# the workspace ships breaking changes silently across revs.
petgraph = "0.6"
petgraph-drawing = { version = "0.1", git = "https://github.com/likr/egraph-rs", rev = "8e986826534774fe7beb9546154407927260e446" }
petgraph-layout-kamada-kawai = { version = "0.1", git = "https://github.com/likr/egraph-rs", rev = "8e986826534774fe7beb9546154407927260e446" }

# WebGPU (optional, only with webgpu feature)
wgpu = { version = "29", features = ["webgpu"], optional = true }
bytemuck = { version = "1", features = ["derive"], optional = true }

# Profile settings are in workspace root Cargo.toml
