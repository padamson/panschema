# Pre-commit hooks for panschema
# Install: cargo install prek && prek install
# Setup: npx playwright@1.60.0 install (required for E2E tests; must match playwright_rs::PLAYWRIGHT_VERSION)
# Run manually: prek run --all-files

fail_fast: true

repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      # Skip `.snap` files: insta records the exact rendered output,
      # which may legitimately carry trailing whitespace from
      # templates. Stripping it desyncs the snapshot from the runtime.
      - id: trailing-whitespace
        exclude: '\.snap$'
      - id: end-of-file-fixer
        exclude: '\.snap$'
      - id: mixed-line-ending
        exclude: '\.snap$'

  # Local Rust hooks
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        description: Auto-format Rust code
        entry: cargo fmt --all
        language: system
        types: [rust]
        pass_filenames: false

      # Feature set is aligned with cargo-nextest and cargo-doctest
      # below (all three use `panschema/dev`) so the Rust build hooks
      # share one dependency compilation instead of each forcing a
      # rebuild under a different feature unification. `--all-features`
      # is deliberately avoided: it pulls in the `gpu`/wgpu tree that
      # neither the tests nor CI's clippy (default + `dev`) exercise, so
      # linting it here only bought a long recompile.
      - id: cargo-clippy
        name: cargo clippy
        description: Run clippy linter
        entry: cargo clippy --workspace --all-targets --features panschema/dev -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      # `dev` is additive (gates the styleguide/component code and its
      # snapshot tests), so one pass with it enabled covers everything
      # CI's two passes (default + --features dev) cover.
      - id: cargo-nextest
        name: cargo nextest
        entry: cargo nextest run --workspace --features panschema/dev
        language: system
        types: [rust]
        pass_filenames: false

      # Same feature set as the two hooks above so it reuses their build.
      - id: cargo-doctest
        name: cargo test --doc
        description: Run documentation tests
        entry: cargo test --doc --workspace --features panschema/dev
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-audit
        name: cargo audit
        description: Check dependencies for known vulnerabilities
        # Keep this ignore list in sync with deny.toml's `[advisories].ignore`.
        # Unmaintained-crate warnings plus the upstream-blocked quick-xml DoS
        # advisories (see deny.toml for the rationale on each).
        entry: >-
          cargo audit
          --ignore RUSTSEC-2024-0388
          --ignore RUSTSEC-2024-0370
          --ignore RUSTSEC-2026-0194
          --ignore RUSTSEC-2026-0195
        language: system
        pass_filenames: false
        files: (Cargo\.toml|Cargo\.lock)$

      - id: cargo-deny
        name: cargo deny
        description: Check licenses, bans, and source restrictions
        entry: cargo deny check
        language: system
        pass_filenames: false
        files: (Cargo\.toml|Cargo\.lock|deny\.toml)$

      - id: cargo-vet
        name: cargo vet
        description: Check that every dependency change is covered by an audit
        entry: cargo vet
        language: system
        pass_filenames: false
        files: (Cargo\.toml|Cargo\.lock|supply-chain/.*\.toml)$
