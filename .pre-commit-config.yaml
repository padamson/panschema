# Pre-commit hooks for panschema
# Install: cargo install prek && prek install
# Setup: npx playwright@1.60.0 install (required for E2E tests; must match playwright_rs::PLAYWRIGHT_VERSION)
# Run manually: prek run --all-files

fail_fast: true

repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending

  # Local Rust hooks
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        description: Auto-format Rust code
        entry: cargo fmt --all
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        description: Run clippy linter
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-check
        name: cargo check
        entry: cargo check --workspace
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-nextest
        name: cargo nextest
        entry: cargo nextest run --workspace
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-doctest
        name: cargo test --doc
        description: Run documentation tests
        entry: cargo test --doc --workspace
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-audit
        name: cargo audit
        description: Check dependencies for known vulnerabilities
        # Ignored advisories mirror deny.toml — unmaintained-crate warnings only.
        entry: >-
          cargo audit
          --ignore RUSTSEC-2024-0388
          --ignore RUSTSEC-2024-0370
          --ignore RUSTSEC-2024-0436
        language: system
        pass_filenames: false
        files: (Cargo\.toml|Cargo\.lock)$

      - id: cargo-deny
        name: cargo deny
        description: Check licenses, bans, and source restrictions
        entry: cargo deny check
        language: system
        pass_filenames: false
        files: (Cargo\.toml|Cargo\.lock|deny\.toml)$
